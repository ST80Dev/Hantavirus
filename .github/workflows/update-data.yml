name: Update data.json

on:
  schedule:
    # Ogni 6 ore (UTC). 02/08/14/20 CEST estate · 01/07/13/19 CET inverno
    - cron: '0 0,6,12,18 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: update-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Genera data.json (RSS + Ollama)
        env:
          OLLAMA_API_KEY: ${{ secrets.OLLAMA_API_KEY }}
        run: python scripts/update_data.py

      - name: Valida schema
        run: python scripts/validate_data.py data.json

      - name: Commit se cambiato (+ snapshot storico)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet data.json; then
            echo "Nessuna modifica a data.json"
          else
            STAMP=$(date -u +'%Y-%m-%d-%H%M')
            mkdir -p history
            cp data.json "history/data-${STAMP}.json"
            git add data.json "history/data-${STAMP}.json"
            git commit -m "chore: data update $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
